#docker build -f triton_server/Dockerfile -t triton-server-custom:latest .
services:
  triton-server:
    # Use pre-built Docker image
    image: triton-server-custom:latest

    container_name: triton-server-v2
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    environment:
      TRITON_HTTP_PORT: "8000"
      TRITON_GRPC_PORT: "8001"
      TRITON_METRICS_PORT: "8002"
      TRITON_LOG_VERBOSE: "1"
      # Thread and memory configuration
      OMP_NUM_THREADS: "1"
      MALLOC_ARENA_MAX: "2"
    volumes:
      - ./model_repository:/models
    shm_size: '1g'
    # Uncomment below to enable GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # gpus: all
    command: >
      tritonserver
      --model-repository=/models
      --http-port=8000
      --grpc-port=8001
      --metrics-port=8002
      --log-verbose=1
      --exit-on-error=false
      --backend-config=python,shm-default-byte-size=16777216
      --allow-metrics=true
