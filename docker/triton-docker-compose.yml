# Build from project root: docker build -f triton_server/Dockerfile -t triton-server-custom:latest .
services:
  triton-server:
    # Use pre-built Docker image
#    image: triton-server-custom:latest
    image: triton-server:v3.0.0

    container_name: triton-server-v2
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    environment:
      TRITON_HTTP_PORT: "8000"
      TRITON_GRPC_PORT: "8001"
      TRITON_METRICS_PORT: "8002"
      TRITON_LOG_VERBOSE: "1"
      # Thread and memory configuration
      OMP_NUM_THREADS: "1"
      MALLOC_ARENA_MAX: "2"
    volumes:
      - ../triton_server/model_repository:/models
    shm_size: '1g'
    # Uncomment below to enable GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # gpus: all
    command: >
      tritonserver
      --model-repository=/models
      --http-port=8000
      --grpc-port=8001
      --metrics-port=8002
      --allow-metrics=true
      --allow-gpu-metrics=true
      --log-verbose=1
      --log-info=true
      --log-warning=true
      --log-error=true
      --exit-on-error=true
      --model-control-mode=none
      --grpc-infer-allocation-pool-size=16
      --grpc-max-response-pool-size=16
      --cuda-memory-pool-byte-size=0:2147483648
      --pinned-memory-pool-byte-size=268435456
      --metrics-interval-ms=2000
